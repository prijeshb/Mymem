<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyMem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
  <!-- Prevent FOUC: apply theme before React hydrates -->
  <script>
    (function () {
      const stored = localStorage.getItem('mymem-theme');
      const dark = stored === 'dark';
      document.documentElement.classList.toggle('dark', dark);
    })();
  </script>
</head>
<body class="h-full bg-[#F8FAFC] text-[#1E293B] antialiased">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
