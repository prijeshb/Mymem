<!DOCTYPE html>
<html lang="en" class="h-full" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}MyMem{% endblock %}</title>

  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#6366f1', dark: '#4f46e5' }
          }
        }
      }
    }
  </script>

  <!-- Marked.js for markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- D3.js for force-directed graph -->
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <link rel="stylesheet" href="/static/style.css" />
</head>

<body class="h-full bg-gray-950 text-gray-100 dark font-sans antialiased">

  <!-- Skip to main content (keyboard / screen reader) -->
  <a href="#main-content" class="skip-link">Skip to content</a>

  <!-- Navbar -->
  <nav class="sticky top-0 z-50 border-b border-gray-800 bg-gray-950/90 backdrop-blur">
    <div class="mx-auto max-w-7xl px-4 flex items-center gap-4 h-14">

      <!-- Logo -->
      <a href="/" class="flex items-center gap-2 font-bold text-lg text-indigo-400 hover:text-indigo-300">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 9.414V19a2 2 0 01-2 2z"/>
        </svg>
        MyMem
      </a>

      <!-- Domain filter pills -->
      <div class="hidden md:flex items-center gap-1 flex-1 overflow-x-auto">
        {% set domains = ['tech','spiritual','finance','health','reminder','research','personal','creative','business'] %}
        {% for d in domains %}
        <a href="/search?domain={{ d }}"
           class="domain-pill px-2.5 py-0.5 rounded-full text-xs font-medium border transition-colors
                  border-gray-700 text-gray-400 hover:border-indigo-500 hover:text-indigo-300
                  {% if active_domain is defined and active_domain == d %}border-indigo-500 text-indigo-300 bg-indigo-950{% endif %}">
          {{ d }}
        </a>
        {% endfor %}
      </div>

      <!-- Nav links -->
      <div class="flex items-center gap-3 ml-auto text-sm">
        <a href="/graph"     class="nav-link">Graph</a>
        <a href="/introspect" class="nav-link">Introspect</a>
        <a href="/ingest"    class="nav-link px-3 py-1 rounded-md bg-indigo-600 hover:bg-indigo-500 text-white">
          + Ingest
        </a>

        <!-- Dark/light toggle -->
        <button id="theme-toggle" class="p-1.5 rounded-md text-gray-400 hover:text-gray-200 hover:bg-gray-800">
          <svg id="icon-moon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
          <svg id="icon-sun" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707
                 m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
        </button>
      </div>

    </div>
  </nav>

  <!-- Main content -->
  <main id="main-content" class="mx-auto max-w-7xl px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
