# MyMem Configuration
# All secrets go in .env — never in this file.

paths:
  raw: raw/
  wiki: wiki/
  outputs: outputs/
  db: data/mymem.db

# LLM provider: anthropic | ollama | openai | nvidia | groq | openrouter
# Free-tier setup: NVIDIA NIM primary (40 RPM/account). On a rate-limit the router
# swaps cross-provider (Groq → Ollama cloud) automatically — see FreeTierFallbackChain.
# Revert to `ollama` for fully local.
provider: nvidia

# Per-task models. The provider for each is resolved from the model registry, so
# heavy tasks run on NVIDIA while frequent light tasks (classify/lint) run on Groq —
# spreading load across two free accounts instead of one 40 RPM bucket.
# (Previous Ollama values: all were gemma4:31b-cloud.)
models:
  compile:       meta/llama-3.3-70b-instruct              # nvidia — raw → wiki article
  merge:         nvidia/llama-3.3-nemotron-super-49b-v1   # nvidia — merge compiled chunks
  qa:            meta/llama-3.3-70b-instruct              # nvidia — research Q&A
  lint:          gemma4:31b-cloud                         # ollama cloud — fast health checks (Groq 6000 TPM too low)
  classify:      gemma4:31b-cloud                         # ollama cloud — fast domain/tag (Groq 6000 TPM too low)
  introspect:    nvidia/llama-3.3-nemotron-super-49b-v1   # nvidia — daily summary
  export_slides: meta/llama-3.3-70b-instruct              # nvidia
  export_charts: meta/llama-3.3-70b-instruct              # nvidia
  embed: nomic-embed-text                                 # embeddings (always local Ollama)

# Ollama settings (used when provider = ollama)
ollama:
  base_url: http://localhost:11434
  timeout_s: 120

# Anthropic settings (used when provider = anthropic)
# Model overrides for task routing:
# anthropic_models:
#   compile: claude-sonnet-4-6
#   lint: claude-haiku-4-5-20251001
#   qa: claude-sonnet-4-6

# Observability
observability:
  log_level: INFO             # DEBUG | INFO | WARNING | ERROR
  log_format: rich            # rich (dev) | json (prod)
  log_file: data/mymem.log    # null to disable file logging
  trace_llm_calls: true       # record latency + token costs to DB
  cost_alert_usd: 1.0         # warn when session cost exceeds this

# Security
security:
  scan_ingested_content: true   # scan raw files for leaked secrets
  prompt_injection_guard: true  # sanitize user queries before LLM
  max_file_size_mb: 50          # reject files larger than this

# Pipeline
pipeline:
  compile_batch_size: 5         # articles compiled in parallel
  index_on_compile: true        # auto-index after each compile
  skip_unchanged: true          # hash-check: skip if raw file unchanged
